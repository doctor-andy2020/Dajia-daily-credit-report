name: DM Credit Morning Report

on:
  # 主力定时器：UTC 23:30 = 北京时间 07:30（与舆情日报相同，验证可靠）
  # DM早报 7:00 已发布，7:30 开始提取，8:30 前完成推送
  # 周一至周五执行（Sun-Thu UTC）
  schedule:
    - cron: '30 23 * * 0-4'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run (bypass all checks)'
        type: boolean
        default: false

jobs:
  dm-morning:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 缓存加速：pip 依赖 ──
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - run: pip install -r requirements.txt

      # ── 缓存加速：Playwright Chromium（DM终端自动化提取需要） ──
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium
          restore-keys: playwright-${{ runner.os }}-

      - run: python -m playwright install chromium

      - name: Run DM morning pipeline
        env:
          TZ: Asia/Shanghai
          EMAIL_ACCOUNT: ${{ secrets.EMAIL_ACCOUNT }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          DM_USER: ${{ secrets.DM_USER }}
          DM_PASS: ${{ secrets.DM_PASS }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force }}" == "true" ]]; then
            python dm_morning_runner.py --force
          else
            python dm_morning_runner.py
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dm-morning-report
          path: |
            DM早报_*.docx
            DM要闻速览_*.docx
          retention-days: 7
