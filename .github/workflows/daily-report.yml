name: Dajia Daily Credit Report（舆情日报 + DM早报双Job）

on:
  # ⚠️ 不设 schedule：GAS triggerWorkflow (BJ 08:12) 是唯一定时触发源，
  #    GitHub cron 延迟 40-80 分钟不可靠，已移除。
  #    DM早报的 cron 兜底保留在 dm-morning-report.yml。
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run (bypass weekend check)'
        type: boolean
        default: false

permissions:
  actions: read
  contents: read

jobs:
  # ── Job 1: 舆情日报（邮件 IMAP → 解析 → 报告 → 发送）──
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # ── 跨 run 去重：当天已有成功/进行中/排队 run 则跳过 ──
      - name: Check existing run today (dedup)
        id: dedup
        run: |
          TODAY_BJ=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          echo "Beijing today: $TODAY_BJ"
          SUCCESS=$(gh run list --workflow="${{ github.workflow }}" --branch=master --status=success --limit=10 --json createdAt --jq ".[] | select(.createdAt >= \"${TODAY_BJ}\") | .createdAt")
          ACTIVE=$(gh run list --workflow="${{ github.workflow }}" --branch=master --status=in_progress --limit=10 --json databaseId,createdAt --jq ".[] | select(.createdAt >= \"${TODAY_BJ}\" and .databaseId != ${{ github.run_id }}) | .createdAt")
          QUEUED=$(gh run list --workflow="${{ github.workflow }}" --branch=master --status=queued --limit=5 --json databaseId,createdAt --jq ".[] | select(.createdAt >= \"${TODAY_BJ}\" and .databaseId != ${{ github.run_id }}) | .createdAt")
          if [ -n "$SUCCESS" ]; then
            echo "Today's report already completed successfully ($SUCCESS). Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          elif [ -n "$ACTIVE" ] || [ -n "$QUEUED" ]; then
            echo "Today's run is already active/queued. Skipping to avoid race."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "No existing run today. Proceeding."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true

      - name: Skip if already done
        if: steps.dedup.outputs.skip == 'true'
        run: |
          echo "⏭  Dedup: skipping this run."
          exit 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - run: pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          TZ: Asia/Shanghai
          EMAIL_ACCOUNT: ${{ secrets.EMAIL_ACCOUNT }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force }}" == "true" ]]; then
            python daily_runner.py --force
          else
            python daily_runner.py
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-report
          path: |
            【大家资产持仓信用主体舆情日报】_*.md
            【大家资产持仓信用主体舆情日报】_*.docx
          retention-days: 7

  # ── Job 2: DM信用早报（DM终端 Playwright → 提取 → DOCX → 发送）──
  dm-morning:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - run: pip install -r requirements.txt

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium
          restore-keys: playwright-${{ runner.os }}-

      - run: python -m playwright install chromium

      # ── 前置检查：由 GAS 触发（workflow_dispatch），sentinel 去重 ──
      - name: DM早报 — 前置检查
        id: dm-check
        continue-on-error: true
        run: |
          TODAY_BJ=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          DATESTR=$(TZ=Asia/Shanghai date +%Y%m%d)
          WEEKDAY=$(TZ=Asia/Shanghai date +%u)
          HOUR_BJ=$(TZ=Asia/Shanghai date +%H)
          HOUR_BJ=$((10#${HOUR_BJ}))
          echo "北京时间: ${TODAY_BJ} 周${WEEKDAY} ${HOUR_BJ}时"
          echo "today=${TODAY_BJ}" >> $GITHUB_OUTPUT
          echo "datestr=${DATESTR}" >> $GITHUB_OUTPUT

          # 检查1: 周末跳过
          if [ "$WEEKDAY" -ge 6 ]; then
            echo "[跳过] 周末不执行"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 检查2: 时间窗口
          if [ "$HOUR_BJ" -lt 7 ] || [ "$HOUR_BJ" -ge 10 ]; then
            echo "[跳过] 当前北京时间 ${HOUR_BJ}时，不在执行窗口(07:00-10:00)内。"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "[通过] 时间窗口检查通过 (${HOUR_BJ}时)"

          # 检查3: sentinel 去重（本 workflow 为 GAS workflow_dispatch 触发）
          SENTINEL=".dm_sentinel_${DATESTR}"
          if [ -f "$SENTINEL" ]; then
            echo "[跳过] 今日已发送 (sentinel: ${SENTINEL})"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "[通过] sentinel 去重检查通过"

          echo "skip=false" >> $GITHUB_OUTPUT

      - name: DM早报 — 提取与发送
        if: steps.dm-check.outputs.skip != 'true'
        env:
          TZ: Asia/Shanghai
          EMAIL_ACCOUNT: ${{ secrets.EMAIL_ACCOUNT }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          DM_USER: ${{ secrets.DM_USER }}
          DM_PASS: ${{ secrets.DM_PASS }}
        run: python dm_morning_runner.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dm-morning-report
          path: |
            DM早报_*.docx
            DM要闻速览_*.docx
          retention-days: 7
